<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>대학생 가계부</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>💰 대학생 가계부</h1>

    <div class="card">
        <h2>내역 추가</h2>

        <input type="date" id="date">

        <input type="number" id="amount" placeholder="금액 입력">

        <select id="type">
            <option value="income">수입</option>
            <option value="expense">지출</option>
        </select>

       <select id="category"></select>

        <input
            type="text"
            id="customCategory"
            placeholder="기타 카테고리 입력"
            style="display:none;">

        <input
            type="text"
            id="memo"
            placeholder="내용 입력 (예: 학식, 영화관, 편의점)">

        <button id="addBtn">추가</button>
    </div>

    <div class="summary">
        <div class="box income">
            <h3>총 수입</h3>
            <p id="totalIncome">0원</p>
        </div>

        <div class="box expense">
            <h3>총 지출</h3>
            <p id="totalExpense">0원</p>
        </div>

        <div class="box balance">
            <h3>현재 잔액</h3>
            <p id="balance">0원</p>
        </div>
    </div>

    <div class="card">
        <h2>소비 분석</h2>
        <p id="analysis">아직 데이터가 없습니다.</p>
    </div>

    <div class="card">
        <h2>가계부 내역</h2>

        <table>
            <thead>
                <tr>
                    <th>날짜</th>
                    <th>종류</th>
                    <th>카테고리</th>
                    <th>내용</th>
                    <th>금액</th>
                    <th>삭제</th>
                </tr>
            </thead>

            <tbody id="tableBody"></tbody>
        </table>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
